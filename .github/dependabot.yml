version: 2
updates:
  # Go dependencies
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      go-dependencies:
        patterns:
          - "*"
    labels:
      - "🛠️dependencies"
    commit-message:
      prefix: "chore(go-deps:backend)"
      include: "scope"

  # NPM dependencies for frontend
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      frontend-dependencies:
        patterns:
          - "*"
    labels:
      - "🛠️dependencies"
    commit-message:
      prefix: "chore(npm-deps:frontend)"
      include: "scope"

  # NPM dependencies for website
  - package-ecosystem: "npm"
    directory: "/website"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      website-dependencies:
        patterns:
          - "*"
    labels:
      - "🛠️dependencies"
    commit-message:
      prefix: "chore(npm-deps:website)"
      include: "scope"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      github-actions:
        patterns:
          - "*"
    labels:
      - "🛠️dependencies"
    commit-message:
      prefix: "chore(actions-deps)"
