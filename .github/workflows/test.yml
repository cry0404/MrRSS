name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Install Linux dependencies (Wails v3)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev \
            libwebkitgtk-6.0-dev \
            libsoup-3.0-dev \
            gcc \
            pkg-config

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: '1.25'

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend (required for embed)
        working-directory: ./frontend
        run: |
          npm ci
          npm run build

      - name: Download dependencies
        run: go mod download

      - name: Run go vet
        run: go vet ./...
        continue-on-error: true

      - name: Run tests
        env:
          CGO_ENABLED: 1
        run: go test -v -timeout=5m -coverprofile=coverage.out -covermode=atomic ./internal/...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.out
          flags: backend

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run linter
        working-directory: ./frontend
        run: npm run lint

      - name: Run unit tests
        working-directory: ./frontend
        run: npm test

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

  validate-skills:
    name: Validate Skills
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Verify MrRSS skill metadata
        run: |
          test -f skills/mrrss-assistant/SKILL.md
          test -f skills/mrrss-assistant/agents/openai.yaml
          grep -q '^name: mrrss-assistant$' skills/mrrss-assistant/SKILL.md
          grep -q '^description: ' skills/mrrss-assistant/SKILL.md
          grep -q 'Use $mrrss-assistant' skills/mrrss-assistant/agents/openai.yaml

      - name: Verify generated skill API reference
        run: |
          python skills/mrrss-assistant/scripts/generate_api_reference.py docs/SERVER_MODE/swagger.json skills/mrrss-assistant/references/api.md
          git diff --exit-code skills/mrrss-assistant/references/api.md

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Install Linux dependencies (Wails v3)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev \
            libwebkitgtk-6.0-dev \
            libsoup-3.0-dev \
            gcc \
            pkg-config

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: '1.25'

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend (required for embed)
        working-directory: ./frontend
        run: npm run build

      - name: Verify Go code compiles
        env:
          CGO_ENABLED: 1
        run: go build -v ./...
